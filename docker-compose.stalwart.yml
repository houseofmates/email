services:
  stalwart:
    image: stalwartlabs/stalwart:latest
    container_name: stalwart
    restart: unless-stopped
    ports:
      - "8080:8080"   # HTTP API (including JMAP)
    volumes:
      - ./stalwart/config:/etc/stalwart:rw
      - ./stalwart/data:/var/lib/stalwart
      - ./stalwart/db:/var/lib/email-db:rw
    environment:
      - TZ=America/Los_Angeles
      # Uncomment the following to enable debug logging
      # - RUST_LOG=debug
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/jmap/session"]
      interval: 30s
      timeout: 10s
      retries: 3

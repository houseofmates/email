services:
  stalwart:
    image: stalwartlabs/stalwart:v0.16.8
    container_name: stalwart
    restart: unless-stopped
    ports:
      - "8080:8080"   # HTTP API (including JMAP)
    volumes:
      - /home/house/stalwart-config:/etc/stalwart:rw
      - ./stalwart/data:/var/lib/stalwart
      - ./stalwart/db:/var/lib/email-db:rw
    environment:
      - TZ=America/Los_Angeles
      - STALWART_RECOVERY_ADMIN=admin:bNS8KtRE1w0y7A08

    healthcheck:
      test: ["CMD-SHELL", "stalwart -c /etc/stalwart/config.json 2>&1 | head -1 || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>passwords</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="wrap">
      <h1 class="title">passwords</h1>
      <p class="sub">your email aliases</p>

      <p class="status" id="status"></p>

      <div class="list" id="list"></div>

      <button class="btn btn-gold wide" id="addBtn" style="margin-top: 14px">
        add alias
      </button>

      <!-- inline add form (hidden until "add alias") -->
      <div class="form hidden" id="addForm">
        <div class="divider"></div>
        <label class="label" for="email">email alias</label>
        <input class="input" id="email" type="email" placeholder="you@yourdomain.com" />

        <label class="label" for="username">username</label>
        <input class="input" id="username" type="text" placeholder="username" />

        <label class="label" for="password">password</label>
        <input class="input" id="password" type="text" placeholder="leave blank to skip" />

        <label class="label" for="notes">notes <span class="opt">(optional)</span></label>
        <input class="input" id="notes" type="text" placeholder="notes" />

        <div class="actions">
          <button class="btn btn-ghost" id="cancelBtn" type="button">cancel</button>
          <button class="btn btn-gold" id="saveBtn" type="button">save</button>
        </div>
      </div>

      <div class="foot">
        <button class="link" id="optionsBtn">settings</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>

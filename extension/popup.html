<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=380" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
  <title>passwords</title>
</head>
<body>
  <div id="app">
    <!-- tabs -->
    <div class="tabs">
      <button id="tabPasswords" class="tab active">passwords</button>
      <button id="tabAliases" class="tab">aliases</button>
    </div>

    <div id="sub" class="subtitle">your logins</div>

    <!-- search -->
    <div class="search">
      <input type="text" id="search" placeholder="search..." />
    </div>

    <!-- list area -->
    <div id="list" class="list"></div>

    <!-- status -->
    <div id="status" class="status"></div>

    <!-- add form -->
    <div id="addForm" class="form hidden">
      <!-- passwords fields -->
      <div id="pwFields">
        <input type="text" id="site" placeholder="site" />
        <input type="text" id="purl" placeholder="url" />
      </div>
      <!-- alias fields -->
      <div id="aliasFields" class="hidden">
        <input type="email" id="email" placeholder="alias@domain" />
      </div>
      <input type="text" id="username" placeholder="username" />
      <input type="text" id="password" placeholder="password" />
      <div class="pw-row">
        <button id="genBtn" class="btn-sm">generate</button>
      </div>
      <input type="text" id="notes" placeholder="notes" />
      <div class="form-actions">
        <button id="saveBtn" class="btn btn-gold">save</button>
        <button id="cancelBtn" class="btn btn-ghost">cancel</button>
      </div>
    </div>

    <!-- bottom bar -->
    <div class="bottom-bar">
      <button id="addBtn" class="btn btn-gold">add</button>
      <div class="bottom-right">
        <button id="exportBtn" class="btn-sm">export</button>
        <input type="file" id="importFile" accept=".json" hidden />
        <button id="importBtn" class="btn-sm">import</button>
        <button id="optionsBtn" class="btn-sm" title="settings">⚙</button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>

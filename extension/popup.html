<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Alias Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #050505;
      --bg-dark: #000000;
      --accent-yellow: #f6b012;
      --accent-blue: #3c9fdd;
      --text-primary: #ffffff;
      --text-accent: #f6b012;
      --text-info: #3c9fdd;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Varela Round', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      width: 300px;
      padding: 16px;
    }
    h1 {
      font-size: 1.5em;
      margin-bottom: 16px;
      text-align: center;
      color: var(--text-accent);
      text-transform: lowercase;
    }
    .alias-list {
      margin-bottom: 16px;
      max-height: 200px;
      overflow-y: auto;
    }
    .alias-item {
      background-color: var(--bg-dark);
      border: 1px solid #333;
      border-radius: 4px;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .alias-info {
      flex: 1;
    }
    .alias-email {
      font-weight: bold;
      text-transform: lowercase;
    }
    .alias-username {
      font-size: 0.9em;
      opacity: 0.8;
    }
    .alias-actions {
      display: flex;
      gap: 8px;
    }
    .btn {
      background-color: var(--accent-yellow);
      color: var(--bg-primary);
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9em;
      text-transform: lowercase;
      transition: opacity 0.2s;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .btn-delete {
      background-color: #ff6b6b;
      color: var(--bg-primary);
    }
    .btn-add {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      font-size: 1em;
    }
    .form-group {
      margin-bottom: 12px;
    }
    .form-group label {
      display: block;
      margin-bottom: 4px;
      font-size: 0.9em;
      text-transform: lowercase;
    }
    .form-group input {
      width: 100%;
      padding: 8px;
      border: 1px solid #555;
      border-radius: 4px;
      background-color: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'Varela Round', sans-serif;
    }
    .form-group input::placeholder {
      color: #777;
    }
    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      text-align: center;
      font-size: 0.9em;
      min-height: 20px;
    }
    .status.success {
      background-color: rgba(46, 204, 113, 0.2);
      border: 1px solid #2ecc71;
      color: #2ecc71;
    }
    .status.error {
      background-color: rgba(231, 76, 60, 0.2);
      border: 1px solid #e74c3c;
      color: #e74c3c;
    }
    .status.loading {
      background-color: rgba(52, 152, 219, 0.2);
      border: 1px solid #3498db;
      color: #3498db;
    }
  </style>
</head>
<body>
  <h1>email alias manager</h1>
  <div id="status" class="status"></div>
  <div class="alias-list" id="aliasList">
    <!-- Alias items will be inserted here -->
  </div>
  <button id="addAliasBtn" class="btn btn-add">add alias</button>

  <div id="addAliasModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 1000; display: flex; justify-content: center; align-items: center;">
    <div style="background-color: var(--bg-dark); padding: 24px; border-radius: 8px; width: 90%; max-width: 300px;">
      <h2 style="text-align: center; margin-bottom: 16px; color: var(--text-accent); text-transform: lowercase;">add new alias</h2>
      <form id="aliasForm">
        <div class="form-group">
          <label for="aliasInput">email alias</label>
          <input type="email" id="aliasInput" required>
        </div>
        <div class="form-group">
          <label for="usernameInput">username</label>
          <input type="text" id="usernameInput" required>
        </div>
        <div class="form-group">
          <label for="passwordInput">password</label>
          <input type="password" id="passwordInput">
        </div>
        <div class="form-group">
          <label for="notesInput">notes</label>
          <input type="text" id="notesInput">
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px;">
          <button type="button" id="cancelBtn" class="btn">cancel</button>
          <button type="submit" id="saveBtn" class="btn btn-add">save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8080/api'; // Adjust if needed
    let authToken = null; // We'll need to get this from storage or prompt user

    // For simplicity, we'll assume the user has already logged in via the web interface and we can retrieve token from localStorage
    // In a real extension, we might need to implement login flow or use the same auth as the web app.
    // We'll try to get token from chrome.storage.local or sync.

    async function getAuthToken() {
      // Try to get from storage
      return new Promise((resolve) => {
        chrome.storage.local.get(['authToken'], (result) => {
          resolve(result.authToken || null);
        });
      });
    }

    function setStatus(message, type = '') {
      const statusEl = document.getElementById('status');
      statusEl.textContent = message;
      statusEl.className = 'status ' + type;
    }

    async function loadAliases() {
      setStatus('loading...', 'loading');
      const token = await getAuthToken();
      if (!token) {
        setStatus('please log in to the web app first', 'error');
        return;
      }
      try {
        const response = await fetch(`${API_BASE}/aliases`, {
          headers: {
            'Authorization': `Basic ${token}` // Assuming we stored a Basic token
          }
        });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const aliases = await response.json();
        renderAliases(aliases);
        setStatus('');
      } catch (error) {
        console.error(error);
        setStatus('failed to load aliases', 'error');
      }
    }

    function renderAliases(aliases) {
      const listEl = document.getElementById('aliasList');
      listEl.innerHTML = '';
      if (aliases.length === 0) {
        listEl.innerHTML = '<p style="text-align: center; color: #777;">no aliases yet</p>';
        return;
      }
      aliases.forEach(alias => {
        const div = document.createElement('div');
        div.className = 'alias-item';
        div.innerHTML = `
          <div class="alias-info">
            <div class="alias-email">${alias.alias || ''}</div>
            <div class="alias-username">${alias.username || ''}</div>
          </div>
          <div class="alias-actions">
            <button class="btn" data-id="${alias.id}" data-action="edit">edit</button>
            <button class="btn btn-delete" data-id="${alias.id}" data-action="delete">delete</button>
          </div>
        `;
        listEl.appendChild(div);
      });
      // Add event listeners for edit/delete buttons
      document.querySelectorAll('[data-action="edit"]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.target.dataset.id;
          // Find alias in list (we don't have the full object here, we'd need to store it)
          // For simplicity, we'll just show an alert that edit is not implemented in this minimal version
          alert('Edit functionality not implemented in this minimal version. Please use the web app.');
        });
      });
      document.querySelectorAll('[data-action="delete"]').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const id = e.target.dataset.id;
          if (confirm('Are you sure you want to delete this alias?')) {
            const token = await getAuthToken();
            try {
              const response = await fetch(`${API_BASE}/aliases/${id}`, {
                method: 'DELETE',
                headers: {
                  'Authorization': `Basic ${token}`
                }
              });
              if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
              }
              loadAliases(); // Reload list
            } catch (error) {
              console.error(error);
              setStatus('failed to delete alias', 'error');
            }
          }
        });
      });
    }

    document.getElementById('addAliasBtn').addEventListener('click', () => {
      document.getElementById('addAliasModal').style.display = 'flex';
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      document.getElementById('addAliasModal').style.display = 'none';
    });

    document.getElementById('aliasForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const aliasInput = document.getElementById('aliasInput');
      const usernameInput = document.getElementById('usernameInput');
      const passwordInput = document.getElementById('passwordInput');
      const notesInput = document.getElementById('notesInput');

      const alias = aliasInput.value.trim();
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      const notes = notesInput.value.trim() || null;

      if (!alias || !username) {
        setStatus('email alias and username are required', 'error');
        return;
      }

      const token = await getAuthToken();
      if (!token) {
        setStatus('please log in to the web app first', 'error');
        return;
      }

      setStatus('saving...', 'loading');
      try {
        const response = await fetch(`${API_BASE}/aliases`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Basic ${token}`
          },
          body: JSON.stringify({
            email: alias,
            username: username,
            password: password,
            notes: notes
          })
        });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const newAlias = await response.json();
        // Add to list (we could reload, but for simplicity we'll push)
        const listEl = document.getElementById('aliasList');
        if (listEl.children.length === 1 && listEl.firstChild.tagName === 'P') {
          listEl.innerHTML = '';
        }
        const div = document.createElement('div');
        div.className = 'alias-item';
        div.innerHTML = `
          <div class="alias-info">
            <div class="alias-email">${newAlias.alias || ''}</div>
            <div class="alias-username">${newAlias.username || ''}</div>
          </div>
          <div class="alias-actions">
            <button class="btn" data-id="${newAlias.id}" data-action="edit">edit</button>
            <button class="btn btn-delete" data-id="${newAlias.id}" data-action="delete">delete</button>
          </div>
        `;
        listEl.appendChild(div);
        // Reset form
        aliasInput.value = '';
        usernameInput.value = '';
        passwordInput.value = '';
        notesInput.value = '';
        document.getElementById('addAliasModal').style.display = 'none';
        setStatus('alias added successfully', 'success');
        setTimeout(() => {
          setStatus('');
        }, 2000);
      } catch (error) {
        console.error(error);
        setStatus('failed to add alias', 'error');
      }
    });

    // Initialize
    loadAliases();
  </script>
</body>
</html>
